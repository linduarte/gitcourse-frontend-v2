<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Git Course</title>
    <link rel="stylesheet" href="../assets/css/gitcourse.css">
</head>
<body>
<main class="container login-box" style="max-width: 400px; margin: 50px auto;">
    <h1 style="text-align:center; margin-bottom:25px;">Git Course</h1>

    <div class="card">
        <h2 style="text-align:center; margin-bottom:20px;">Entrar</h2>
        <form id="login-form" autocomplete="on">
            <div class="form-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" placeholder="seu@email.com" autocomplete="email" required>
            </div>
            <div class="form-group">
                <label for="password">Senha</label>
                <input type="password" id="password" placeholder="Sua senha" autocomplete="current-password" required>
            </div>
            <button id="btn-login" type="submit" class="btn-footer-primary">
            Entrar
            </button>
        </form>

        <div id="result" style="margin-top:15px; text-align:center;"></div>
        <p style="text-align:center; margin-top:20px;">
            Ainda não tem conta? <a href="register.html">Registre-se</a>
        </p>
    </div>
</main>

<!-- Scripts: ordem importa! -->
<script type="module" src="/gitcourse-frontend-v2/assets/js/login.js"></script>
</body>
</html>
