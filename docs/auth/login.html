<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login - Git Course</title>

  <link rel="stylesheet" href="../assets/css/gitcourse.css">
</head>

<body>

<main class="container login-box" style="max-width:400px; margin:50px auto;">
  <h1 style="text-align:center;">Git Course</h1>

  <div class="card">
    <h2 style="text-align:center;">Entrar</h2>

    <form id="loginForm">

      <label for="email" class="sr-only">E-mail</label>
      <input id="email" type="email" placeholder="E-mail" autocomplete="email" required>

      <label for="password" class="sr-only">Senha</label>
      <input id="password" type="password" placeholder="Senha" autocomplete="current-password" required>

      <button type="submit">Login</button>

      <p id="loginMessage" style="text-align:center; margin-top:10px;"></p>
    </form>

    <p style="text-align:center; margin-top:20px;">
      Ainda não tem conta?
      <a href="register.html">Registre-se</a>
    </p>

  </div>
</main>

<!-- Scripts -->
<script type="module" src="../assets/js/config.js"></script>
<script type="module" src="../assets/js/login.js"></script>

</body>
</html>
