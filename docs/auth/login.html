<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login - Git Course</title>

  <link rel="stylesheet" href="../assets/css/gitcourse.css">
</head>

<body>

<main class="container login-box" style="max-width:400px; margin:50px auto;">
  <h1 style="text-align:center;">Git Course</h1>

  <div class="card">
    <h2 style="text-align:center;">Entrar</h2>

    <form id="login-form" autocomplete="on">

      <label for="email">E-mail</label>
      <input 
        type="email" 
        id="email" 
        placeholder="seu@email.com"
        autocomplete="email"
        required
      >

      <label for="password">Senha</label>
      <input 
        type="password" 
        id="password" 
        placeholder="Sua senha"
        autocomplete="current-password"
        required
      >

      <button 
        id="btn-login"
        type="submit" 
        class="btn-footer-primary"
        style="width:100%; margin-top:15px;">
        Entrar
      </button>

    </form>

    <div id="result" style="margin-top:15px;"></div>

    <p style="text-align:center; margin-top:20px;">
      Ainda não tem conta?
      <a href="register.html">Registre-se</a>
    </p>

  </div>
</main>

<!-- Scripts -->
<script type="module" src="../assets/js/config.mjs"></script>
<script type="module" src="../assets/js/login.mjs"></script>

</body>
</html>
