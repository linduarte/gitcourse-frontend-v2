<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Login - Git Course</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Victor+Mono:wght@100..700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="../assets/css/gitcourse.css">

    <style>
        .login-box .card { background-color: #f8f9fa !important; border: 1px solid #e9ecef !important; padding: 30px; border-radius: 8px; }
        .btn-footer-primary { background-color: #5f9ea0 !important; border: none; color: white; padding: 12px; width: 100%; cursor: pointer; margin-top: 15px; border-radius: 4px; font-weight: bold; }
        .btn-footer-primary:hover { background-color: #4f8e90 !important; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
    </style>
</head>

<body>
    <main class="container login-box" style="max-width: 400px; margin: 50px auto;">
        <h1 style="text-align:center; margin-bottom:25px;">Git Course</h1>

        <div class="card">
            <h2 style="text-align:center; margin-bottom:20px;">Entrar</h2>

            <form id="login-form">
                <div class="form-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" name="username" placeholder="seu@email.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Senha</label>
                    <input type="password" id="password" name="password" placeholder="Sua senha" required>
                </div>

                <button type="submit" class="btn-footer-primary">Entrar</button>
            </form>

            <div id="result" style="margin-top:15px; text-align: center;"></div>
            <div id="login-success-banner" style="margin-top:10px;"></div>

            <p style="text-align:center; margin-top:20px;">
                Ainda não tem conta? <a href="register.html">Registre-se</a>
            </p>
        </div>
    </main>

    <script>const API_URL = "http://charles-gitcourse.duckdns.org";</script>

    <script type="module" src="../assets/js/login.js?v=1.2"></script>
    

</body>
</html>
