<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>Registro - Git Course</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Victor+Mono:wght@100..700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../assets/css/gitcourse.css">
</head>

<body>

  <main>
    <div class="container register-box">

      <h1 style="text-align:center; margin-bottom:25px;">Criar Conta</h1>

      <div class="card" style="padding:30px;">

        <h2 style="text-align:center; margin-bottom:20px;">Registre-se</h2>

        <form id="registerForm" autocomplete="on">

  <!-- EMAIL -->
      <label for="email">Email</label>
      <input 
        type="email" 
        id="email"
        name="email"
        placeholder="seu@email.com"
        autocomplete="email"
        required
      >

      <!-- SENHA -->
      <label for="password">Senha</label>
      <input 
        type="password" 
        id="password"
        name="password"
        placeholder="Crie uma senha"
        autocomplete="new-password"
        required
      >

      <button type="submit" class="btn-footer-primary" style="width:100%; margin-top:15px;">
        Registrar
      </button>

      </form>

        <div id="result" style="margin-top:15px;"></div>

        <p style="text-align:center; margin-top:20px;">
          Já tem conta?
          <a href="login.html" class="footer-link">Faça login</a>
        </p>

      </div>

      <div class="footer" style="margin-top:30px;">
        <p>&copy; 2025 Curso de Git</p>

        <div class="footer-badges">

          <a href="https://pages.github.com/" class="github-link">
            <span>Powered by GitHub Pages</span>
            <img src="../assets/images/github-mark-white.png"
                 alt="GitHub Logo"
                 class="footer-logo"
                 width="16" height="16">
          </a>

          <a href="https://jigsaw.w3.org/css-validator/check/referer" class="w3c-link">
            <img src="https://jigsaw.w3.org/css-validator/images/vcss"
                 alt="CSS válido!"
                 class="footer-logo"
                 width="45" height="16">
          </a>

        </div>
      </div>

    </div>
  </main>

  <script>
const API_URL = "https://charles-gitcourse.duckdns.org";

// 🎯 Foco automático
document.getElementById("email").focus();

document.getElementById("registerForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();
    const resultEl = document.getElementById("result");

    // 💡 feedback visual melhor
    resultEl.style.color = "#9ca3af";
    resultEl.textContent = "Criando conta...";

    try {
        const response = await fetch(`${API_URL}/auth/register`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (response.ok) {
            // 💾 salva email para login automático depois
            localStorage.setItem("user_email", email);

            resultEl.style.color = "#4ade80";
            resultEl.textContent = "Conta criada com sucesso! Redirecionando...";

            setTimeout(() => {
                window.location.href = "login.html";
            }, 1200);

        } else {
            resultEl.style.color = "#f87171";

            if (typeof data.detail === "string") {
                resultEl.textContent = "Erro: " + data.detail;
            } else if (Array.isArray(data.detail)) {
                resultEl.textContent = "Erro: " + data.detail[0].msg;
            } else {
                resultEl.textContent = "Erro ao registrar.";
            }
        }

    } catch (err) {
        console.error(err);
        resultEl.style.color = "#f87171";
        resultEl.textContent = "Erro ao conectar ao servidor.";
    }
});
</script>


</body>
</html>
