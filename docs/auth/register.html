<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>Registro - Git Course</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Victor+Mono:wght@100..700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../assets/css/gitcourse.css">
</head>

<body>

  <main>
    <div class="container register-box">

      <h1 style="text-align:center; margin-bottom:25px;">Criar Conta</h1>

      <div class="card" style="padding:30px;">

        <h2 style="text-align:center; margin-bottom:20px;">Registre-se</h2>

        <form id="registerForm" autocomplete="on">

  <!-- EMAIL -->
      <label for="email">Email</label>
      <input 
        type="email" 
        id="email"
        name="email"
        placeholder="seu@email.com"
        autocomplete="email"
        required
      >

      <!-- SENHA -->
      <label for="password">Senha</label>
      <input 
        type="password" 
        id="password"
        name="password"
        placeholder="Crie uma senha"
        autocomplete="new-password"
        required
      >

      <button type="submit" class="btn-footer-primary" style="width:100%; margin-top:15px;">
        Registrar
      </button>

      </form>

        <div id="result" style="margin-top:15px;"></div>

        <p style="text-align:center; margin-top:20px;">
          Já tem conta?
          <a href="login.html" class="footer-link">Faça login</a>
        </p>

      </div>

      <div class="footer" style="margin-top:30px;">
        <p>&copy; 2025 Curso de Git</p>

        <div class="footer-badges">

          <a href="https://pages.github.com/" class="github-link">
            <span>Powered by GitHub Pages</span>
            <img src="../assets/images/github-mark-white.png"
                 alt="GitHub Logo"
                 class="footer-logo"
                 width="16" height="16">
          </a>

          <a href="https://jigsaw.w3.org/css-validator/check/referer" class="w3c-link">
            <img src="https://jigsaw.w3.org/css-validator/images/vcss"
                 alt="CSS válido!"
                 class="footer-logo"
                 width="45" height="16">
          </a>

        </div>
      </div>

    </div>
  </main>

  <!-- ✔ ORDEM CORRETA -->
  <script src="/gitcourse-frontend-v2/assets/js/config.js"></script>
  <script src="/gitcourse-frontend-v2/assets/js/register.js"></script>
  <script>


// 🎯 Foco automático
document.getElementById("email").focus();


</script>

</body>
</html>
