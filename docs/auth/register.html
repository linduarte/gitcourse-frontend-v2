<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Registro - Git Course</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Victor+Mono:wght@100..700&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="../assets/css/gitcourse.css">
</head>

<body>

<main class="container register-box" style="max-width:400px; margin:50px auto;">
  <h1 style="text-align:center; margin-bottom:25px;">Criar Conta</h1>

  <div class="card" style="padding:30px;">
    <h2 style="text-align:center; margin-bottom:20px;">Registre-se</h2>

    <form id="registerForm" autocomplete="on" novalidate>

      <label for="email">Email</label>
      <input 
        type="email" 
        id="email" 
        placeholder="seu@email.com" 
        autocomplete="email" 
        required
      >

      <label for="password">Senha</label>
      <input 
        type="password" 
        id="password" 
        placeholder="Crie uma senha" 
        autocomplete="new-password" 
        required
      >

      <button 
        type="submit"
        style="width:100%; margin-top:15px;"
      >
        Registrar
      </button>

      <p id="registerMessage"
         style="text-align:center; margin-top:15px;"
         aria-live="polite"></p>
    </form>

    <p style="text-align:center; margin-top:20px;">
      Já tem conta? 
      <a href="login.html" class="footer-link">Faça login</a>
    </p>
  </div>
</main>

<!-- Scripts -->
<script type="module" src="../assets/js/register.js"></script>

</body>
</html>
