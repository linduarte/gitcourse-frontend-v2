<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dashboard - Git Course</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Victor+Mono:wght@100..700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.25.0/themes/prism.min.css">
  <link rel="stylesheet" href="assets/css/gitcourse.css">
  <link rel="stylesheet" href="assets/css/dashboard.css">
</head>

<body>

  <aside class="sidebar">
    <h2>Git Course</h2>
    <ul>
      <li><a href="dashboard.html">🏠 Dashboard</a></li>
      <li><a href="curso/git-course/progress.html">📊 Progresso</a></li>
      <li id="menuContinue">⏭ Continuar</li>
      <li id="menuLastTopic">📌 Último tópico</li>
      <li id="menuLogout">🚪 Sair</li>
    </ul>
  </aside>

  <main class="dashboard-container container">
    <h1>Bem-vindo ao Git Course!</h1>
    <p id="welcomeMessage">Carregando...</p>

    <section id="progressCard" class="card">
      <h3>Seu Progresso</h3>
      <div id="progressCardContent">Carregando...</div>
      <div class="progress-bar">
        <div id="progressBarFill" class="progress-bar-fill"></div>
      </div>
      <button type="button" id="btnContinueCard" class="btn-footer-primary">
        Continuar de onde parei →
      </button>
    </section>

    <section id="nextTopicCard" class="card"></section>
    <section id="lastTopicCard" class="card"></section>

    <footer class="footer">
      <div class="footer-badges">
        <a href="https://pages.github.com/" class="github-link">
            <span>🐙 GitHub Pages</span>
            <img src="assets/images/github-mark-white.png" alt="GitHub Logo" class="footer-logo">
        </a>

        <a href="https://jigsaw.w3.org/css-validator/check/referer" class="w3c-link">
            <img src="https://jigsaw.w3.org/css-validator/images/vcss" alt="CSS válido!" class="footer-logo" width="45" height="16">
        </a>
    </div>
    </footer>
  </main>

  <script src="assets/js/config.js"></script>

  <script type="module">
    // 1. Importamos as ferramentas que conversam com a VPS
    import { getCurrentUser } from "./js/git-course-functions.js";

    async function inicializarDashboard() {
        const welcome = document.getElementById('welcomeMessage');
        const token = localStorage.getItem("access_token");

        // Verificação de segurança: Se não tem token, volta pro login
        if (!token) {
            window.location.href = "auth/login.html";
            return;
        }

        try {
            // 2. Chamada à VPS para buscar os dados da 'Ana' (ou o seu)
            const user = await getCurrentUser();

            if (user && user.email) {
                // 3. Sucesso! Substituímos o "Carregando..." pelo e-mail real
                welcome.textContent = `Olá, ${user.email}! 🚀 Pronto para os estudos?`;
                console.log("✅ Dashboard sincronizada com a VPS.");
            } else {
                welcome.textContent = "Erro: Usuário não identificado.";
            }
        } catch (error) {
            console.error("❌ Falha na conexão:", error);
            welcome.textContent = "Servidor offline ou erro de rede.";
        }
    }

    // Dispara a carga assim que a página termina de carregar
    window.onload = inicializarDashboard;
  </script>


  </body>
</html>
