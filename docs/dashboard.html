<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dashboard - Git Course</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Victor+Mono:wght@100..700&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="/gitcourse-frontend-v2/assets/css/gitcourse.css">
  <link rel="stylesheet" href="/gitcourse-frontend-v2/assets/css/dashboard.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.25.0/themes/prism.min.css">
</head>

<body>

  <!-- SIDEBAR -->
  <aside class="sidebar" aria-label="Menu lateral">
    <h2>Git Course</h2>
    <nav>
      <ul>
        <li><a href="#" id="menuDashboard">Dashboard</a></li>
        <li><a href="#" id="menuProgresso">Progresso</a></li>
        <li><a href="#" id="menuContinue">Continuar</a></li>
        <li><a href="#" id="menuSair">Sair</a></li>
      </ul>
    </nav>
  </aside>

  <!-- CONTEÚDO PRINCIPAL -->
  <main class="dashboard-container container">

    <!-- HEADER -->
    <header class="dashboard-header">
      <h1>
        Bem-vindo, 
        <span id="userEmailDisplay">...</span>!
      </h1>
      <p id="welcomeMessage">Iniciando sistema...</p>
    </header>

    <hr>

    <!-- Spinner global -->
    <div id="global-loader" class="hidden">
      <div class="spinner"></div>
    </div>

    <!-- SPA ROOT -->
    <section id="spa-content" aria-live="polite">
      <p class="loading-text">Carregando sua jornada técnica...</p>
    </section>

    <!-- FOOTER -->
    <footer class="footer">
      <div class="footer-badges">
        <a href="https://pages.github.com/" class="github-link">
          <span>🐙 GitHub Pages</span>
          <img 
            src="/gitcourse-frontend-v2/assets/images/github-mark-white.png" 
            alt="GitHub Logo" 
            class="footer-logo"
          >
        </a>

        <a href="https://jigsaw.w3.org/css-validator/check/referer" class="w3c-link">
          <img 
            src="https://jigsaw.w3.org/css-validator/images/vcss" 
            alt="CSS válido!" 
            class="footer-logo" 
            width="45" 
            height="16"
          >
        </a>
      </div>
    </footer>

  </main>

  <!-- JS -->
  <script type="module" src="/gitcourse-frontend-v2/assets/js/dashboard-router.js"></script>
  <script type="module" src="/gitcourse-frontend-v2/assets/js/dashboard-app.js"></script>

</body>
</html>
