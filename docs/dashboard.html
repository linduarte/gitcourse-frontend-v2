<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dashboard - Git Course</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Victor+Mono:wght@100..700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.25.0/themes/prism.min.css">
  <link rel="stylesheet" href="assets/css/gitcourse.css">
  <link rel="stylesheet" href="assets/css/dashboard.css">
</head>

<body>

  <aside class="sidebar">
    <h2>Git Course</h2>
    <ul>
      <li><a href="dashboard.html">🏠 Dashboard</a></li>
      <li><a href="curso/git-course/progress.html">📊 Progresso</a></li>
      <li id="menuContinue" style="cursor: pointer;">⏭ Continuar</li>
      <li id="menuLastTopic" style="cursor: pointer;">📌 Último tópico</li>
      <li id="menuLogout">
        <a href="#" id="logoutLink" style="text-decoration: none; color: inherit;">
          🚪 Sair
        </a>
      </li>
    </ul>
  </aside>

  <main class="dashboard-container container">
    <h1>Bem-vindo, <span id="userEmailDisplay">...</span>!</h1>
    
    <p id="welcomeMessage">Sincronizando com a VPS...</p>

    <section id="progressCard" class="card">
      <h3>Seu Progresso</h3>
      <div id="progressCardContent">Calculando progresso...</div>
      
      <div class="progress-bar">
        <div id="progressBarFill" class="progress-bar-fill" style="width: 0%;"></div>
      </div>

      <button type="button" id="btnContinueCard" class="btn-footer-primary">
        Continuar de onde parei →
      </button>
    </section>

    <footer class="footer">
      <div class="footer-badges">
        <a href="https://pages.github.com/" class="github-link">
          <span>🐙 GitHub Pages</span>
          <img src="assets/images/github-mark-white.png" alt="GitHub Logo" class="footer-logo">
        </a>
        <a href="https://jigsaw.w3.org/css-validator/check/referer" class="w3c-link">
          <img src="https://jigsaw.w3.org/css-validator/images/vcss" alt="CSS válido!" class="footer-logo" width="45" height="16">
        </a>
      </div>
    </footer>
  </main>

  <script src="assets/js/config.js"></script>

  <script type="module">
    import { logout, getCurrentUser } from "./assets/js/git-course-functions.js";

    /**
     * Função Principal de Inicialização
     */
    async function inicializarDashboard() {
        console.log("🔌 Sistema Dashboard: Iniciando...");

        const emailDisplay = document.getElementById("userEmailDisplay");
        const welcomeMsg = document.getElementById("welcomeMessage");
        const logoutBtn = document.getElementById("logoutLink");

        // Captura dados do cache local (gerados no login.js)
        const userEmail = localStorage.getItem("user_email");
        const token = localStorage.getItem("access_token");

        // Validação de Segurança (Circuit Breaker)
        if (!token || !userEmail) {
            console.warn("🔒 Sessão inválida ou expirada. Redirecionando...");
            window.location.href = "auth/login.html";
            return;
        }

        // 1. Exibição imediata (Identificação Visual)
        if (emailDisplay) emailDisplay.textContent = userEmail;
        
        try {
            // 2. Sincronização em tempo real com a VPS
            const userData = await getCurrentUser();
            
            if (userData && userData.email) {
                welcomeMsg.textContent = "Sessão ativa e sincronizada com a VPS.";
                console.log("✅ Usuário validado na VPS:", userData.email);
            } else {
                welcomeMsg.textContent = "Aviso: Trabalhando em modo Offline.";
                console.warn("⚠️ Não foi possível validar o token com o servidor.");
            }
        } catch (error) {
            console.error("💥 Erro de conexão:", error);
            welcomeMsg.textContent = "Servidor Offline. Usando dados locais.";
        }

        // 3. Configuração do botão de Logout
        logoutBtn?.addEventListener('click', (e) => {
            e.preventDefault();
            console.log("🚪 Encerrando sessão...");
            logout();
        });
    }

    // Dispara a carga assim que o DOM estiver pronto
    document.addEventListener('DOMContentLoaded', inicializarDashboard);
  </script>

</body>
</html>
