<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dashboard - Git Course</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Victor+Mono:wght@100..700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.25.0/themes/prism.min.css">
  <link rel="stylesheet" href="assets/css/gitcourse.css">
  <link rel="stylesheet" href="assets/css/dashboard.css">
</head>

<body>

  <aside class="sidebar">
    <h2>Git Course</h2>
    <ul>
      <li><a href="dashboard.html">🏠 Dashboard</a></li>
      <li><a href="curso/git-course/progress.html">📊 Progresso</a></li>
      <li id="menuContinue">⏭ Continuar</li>
      <li id="menuLastTopic">📌 Último tópico</li>
      <li id="menuLogout">🚪 Sair</li>
    </ul>
  </aside>

  <main class="dashboard-container container">
    <h1>Bem-vindo ao Git Course!</h1>
    
    <p id="welcomeMessage">Sincronizando com a VPS...</p>

    <section id="progressCard" class="card">
      <h3>Seu Progresso</h3>
      
      <div id="progressCardContent">Calculando progresso...</div>
      
      <div class="progress-bar">
        <div id="progressBarFill" class="progress-bar-fill" style="width: 0%;"></div>
      </div>

      <button type="button" id="btnContinueCard" class="btn-footer-primary">
        Continuar de onde parei →
      </button>
    </section>
  </main>

  
    <footer class="footer">
      <div class="footer-badges">
        <a href="https://pages.github.com/" class="github-link">
            <span>🐙 GitHub Pages</span>
            <img src="assets/images/github-mark-white.png" alt="GitHub Logo" class="footer-logo">
        </a>

        <a href="https://jigsaw.w3.org/css-validator/check/referer" class="w3c-link">
            <img src="https://jigsaw.w3.org/css-validator/images/vcss" alt="CSS válido!" class="footer-logo" width="45" height="16">
        </a>
    </div>
    </footer>
  

  <script src="assets/js/config.js"></script>

  <script type="module">
    import { getCurrentUser, getProgress } from "./js/git-course-functions.js";

    async function inicializarPainel() {
        const welcome = document.getElementById('welcomeMessage');
        const progressContent = document.getElementById('progressCardContent');
        const progressBar = document.getElementById('progressBarFill');

        try {
            // 1. Busca os dados do usuário (Ana/Charles)
            const user = await getCurrentUser();
            
            if (user && user.email) {
                welcome.textContent = `Olá, ${user.email}! 🚀 Pronto para continuar?`;
                
                // 2. Busca o progresso real desse usuário na VPS
                const progress = await getProgress();
                
                if (progress) {
                    // Atualiza o texto e a barra de progresso (ex: 45%)
                    progressContent.textContent = `Você completou ${progress.percent}% do curso.`;
                    progressBar.style.width = `${progress.percent}%`;
                    console.log("✅ Dashboard sincronizada com sucesso.");
                }
            } else {
                welcome.textContent = "Sessão expirada. Redirecionando...";
                setTimeout(() => window.location.href = "auth/login.html", 2000);
            }
        } catch (error) {
            console.error("❌ Erro na carga de dados:", error);
            welcome.textContent = "Erro de conexão com a VPS.";
            progressContent.textContent = "Não foi possível carregar seu progresso.";
        }
    }

    // Dispara a ignição
    window.onload = inicializarPainel;
  </script>
  


  </body>
</html>
