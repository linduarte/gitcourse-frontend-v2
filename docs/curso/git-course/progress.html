<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Meu Progresso - Git Course</title>

    <link rel="stylesheet" href="/gitcourse-frontend-v2/assets/css/gitcourse.css">
</head>
<body class="intro-page">

    <div class="container">
        <h1>📊 Detalhes do seu Progresso</h1>

        <div id="detailedProgress" class="card">
            <p>Carregando cronograma de estudos...</p>
        </div>

        <button class="btn-footer-secondary" onclick="window.location.href='/gitcourse-frontend-v2/dashboard.html'">
            ← Voltar ao Dashboard
        </button>
    </div>

    <script type="module">
        import { CONFIG } from "/gitcourse-frontend-v2/assets/js/config.js";

        async function loadFullProgress() {
            const container = document.getElementById("detailedProgress");

            try {
                const resp = await fetch(`${CONFIG.API_URL}/progress/`, {
                    headers: {
                        "Authorization": `Bearer ${localStorage.getItem("access_token")}`
                    }
                });

                const progress = await resp.json();

                container.innerHTML =
                    "<ul>" +
                    progress.map(p => `
                        <li>Tópico ${p.topic_id}: ${p.completed ? '✅ Concluído' : '⏳ Pendente'}</li>
                    `).join('') +
                    "</ul>";

            } catch (e) {
                container.innerHTML = "Erro ao conectar com a VPS.";
            }
        }

        loadFullProgress();
    </script>

</body>
</html>
